spring:
  application:
    name: escape-room-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/escape_room?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  mvc:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:5500,file://"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: your_jwt_secret_key_minimum_256_bits_long_for_security_purposes_change_this_in_production
    expiration: 86400000 # 24 hours in milliseconds
  
  cors:
    frontendUrl: http://localhost:5500

logging:
  level:
    root: INFO
    com.escape.room: DEBUG
